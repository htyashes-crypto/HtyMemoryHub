      .e-aff { stroke: #d6453e; stroke-width: 2; stroke-dasharray: 9 5; fill: none; }
      .e-share { stroke: #2fa35e; stroke-width: 2; stroke-dasharray: 1.5 4.5; stroke-linecap: round; fill: none; }
      .e-rel { stroke: #a8a29a; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; }
      .lg { font-size: 11px; fill: #73726c; }
      .grp { font-size: 11px; font-weight: 700; fill: #a8a29a; letter-spacing: 1px; }
      .mod-name { font-size: 12.5px; font-weight: 600; fill: #191919; }
      .mod-sub { font-size: 11px; fill: #73726c; }
      .chip { fill: #f0eee6; }
      .chip-t { font-size: 10.5px; fill: #73726c; }
    </style>
    <marker id="arr-dep" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#d97757"/></marker>
