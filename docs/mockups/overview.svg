      .accent { fill: #d97757; }
      .accent-text { fill: #c15f3c; }
      .ok { fill: #2fa35e; }
      .err { fill: #d6453e; }
      .card { fill: #ffffff; stroke: #e5e2d9; stroke-width: 1; }
