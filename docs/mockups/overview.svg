  <rect x="248" y="782" width="808" height="80" rx="10" class="card-soft"/>
  <text x="264" y="806" font-size="11" font-weight="700" class="ink-deep">边阅读策略(大规模防乱):① 默认只显纵向依赖骨架 ② 点选模块进焦点模式 = 只显它的进出边,其余节点淡化(本图即焦点态)</text>
  <text x="264" y="826" font-size="11" class="ink-2">③ 边走泳道间正交通道、同通道平行错开,不斜穿节点 ④ 同一对模块多条边聚合为一条 + 计数,点击展开 ⑤ 悬停边显 reason / evidence</text>
  <text x="264" y="846" font-size="11" class="ink-3">规模承诺:50 模块 / 200+ 边时,焦点模式单次可见边 = 该模块度数(通常 &lt;10),始终可读</text>

