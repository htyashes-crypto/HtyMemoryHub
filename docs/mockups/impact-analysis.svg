  <path d="M 512 452 C 448 400 400 356 372 330" class="e-aff" marker-end="url(#ia)"/>
  <path d="M 552 486 C 590 540 620 580 644 610" class="e-aff" marker-end="url(#ia)"/>
  <path d="M 530 440 C 540 380 550 330 556 296" class="e-share" marker-end="url(#is)"/>
  <path d="M 356 306 C 330 270 310 240 296 218" class="e-aff" marker-end="url(#ia)"/>
  <path d="M 668 634 C 706 664 740 692 768 712" class="e-aff" marker-end="url(#ia)"/>
  <circle cx="536" cy="466" r="38" class="n-center"/>
  <text x="536" y="462" class="node-label" fill="#ffffff" font-weight="700">StateSync</text>
  <text x="536" y="476" class="node-label" fill="#ffffff">(改动目标)</text>
  <circle cx="362" cy="318" r="30" class="n-hop1"/>
  <text x="362" y="315" class="node-label">手牌容器</text>
  <text x="362" y="329" class="node-label">与出牌</text>
  <circle cx="654" cy="622" r="30" class="n-hop1"/>
  <text x="654" y="626" class="node-label">卡堆容器</text>
  <circle cx="562" cy="272" r="28" class="n-hop1"/>
  <text x="562" y="269" class="node-label">网络会话</text>
  <text x="562" y="283" class="node-label">联机门</text>
  <circle cx="286" cy="200" r="24" class="n-hop2"/>
  <text x="286" y="197" class="node-label">选牌高亮</text>
  <text x="286" y="211" class="node-label">(feature)</text>
  <circle cx="782" cy="726" r="24" class="n-hop2"/>
  <text x="782" y="723" class="node-label">翻牌动画</text>
  <text x="782" y="737" class="node-label">(feature)</text>
  <rect x="248" y="756" width="360" height="36" rx="8" class="accent-soft"/>
  <text x="264" y="779" font-size="11" class="accent-text">⚠ 知识级波及 · 须配合 Jet 代码反扫双证据(变更契约)</text>

  <!-- ===== 右:分层列表 ===== -->
  <rect x="880" y="152" width="536" height="656" rx="14" class="card"/>
  <text x="904" y="184" class="title">波及清单</text>
  <text x="986" y="184" font-size="11" class="ink-3">5 项 · 按跳数分层 · 每项附理由与历史证据</text>
  <text x="904" y="220" class="hop-t">第 1 跳(直接波及)</text>
  <rect x="896" y="232" width="504" height="72" rx="8" class="card-soft"/>
  <circle cx="914" cy="256" r="4" fill="#d6453e"/>
  <text x="926" y="260" class="item-t">手牌容器与出牌</text>
  <rect x="1250" y="244" width="70" height="20" rx="10" fill="#ffffff" stroke="#e8c8bb"/>
  <text x="1285" y="258" class="ev" text-anchor="middle">BUG-090</text>
  <rect x="1326" y="244" width="62" height="20" rx="10" fill="#ffffff" stroke="#e8c8bb"/>
  <text x="1357" y="258" class="ev" text-anchor="middle">热点#1</text>
  <text x="926" y="282" class="item-r">affects:改同步时序会打坏选牌高亮;回归点 = 联机双端选牌一致性</text>
  <rect x="896" y="312" width="504" height="72" rx="8" class="card-soft"/>
  <circle cx="914" cy="336" r="4" fill="#d6453e"/>
  <text x="926" y="340" class="item-t">卡堆容器</text>
  <text x="926" y="362" class="item-r">affects:面状态收敛顺序变更导致翻牌闪烁回跳;回归点 = 中途加入端面状态恢复</text>
  <rect x="896" y="392" width="504" height="72" rx="8" class="card-soft"/>
  <circle cx="914" cy="416" r="4" fill="#2fa35e"/>
  <text x="926" y="420" class="item-t">网络会话与联机门</text>
  <text x="926" y="442" class="item-r">shares_state:共用 client-ready gate;回归点 = 断线重连后会话重置幂等</text>
  <text x="904" y="516" class="hop-t">第 2 跳(经第 1 跳传导)</text>
  <rect x="896" y="528" width="504" height="64" rx="8" class="card-soft"/>
  <circle cx="914" cy="550" r="4" fill="#d6453e"/>
  <text x="926" y="554" class="item-t">选牌高亮(手牌容器 · feature)</text>
  <text x="926" y="576" class="item-r">经手牌容器传导;回归点 = mulligan 后攻方选牌交互</text>
  <rect x="896" y="600" width="504" height="64" rx="8" class="card-soft"/>
  <circle cx="914" cy="622" r="4" fill="#d6453e"/>
  <text x="926" y="626" class="item-t">翻牌动画(卡堆容器 · feature)</text>
  <text x="926" y="648" class="item-r">经卡堆容器传导;回归点 = 动画完成回调不改权威态</text>
  <line x1="904" y1="688" x2="1392" y2="688" stroke="#eeece4"/>
  <text x="904" y="716" font-size="11.5" class="ink-2">导出内容 = 波及功能 × 回归检查点 × 历史证据,可直接交 AI 展开为完整回归用例。</text>
  <rect x="904" y="736" width="220" height="38" rx="8" fill="#d97757"/>
  <text x="1014" y="760" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">导出回归清单 markdown</text>
  <rect x="1140" y="736" width="150" height="38" rx="8" fill="none" stroke="#d4a27f"/>
  <text x="1215" y="760" font-size="12" class="accent-text" text-anchor="middle">复制给 AI 会话</text>
</svg>
