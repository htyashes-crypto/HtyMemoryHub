<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'HarmonyOS Sans SC', 'Microsoft YaHei', 'PingFang SC', sans-serif; }
      .mono { font-family: 'Consolas', 'Menlo', monospace; }
      .ink-1 { fill: #191919; }
      .ink-2 { fill: #73726c; }
      .ink-3 { fill: #a8a29a; }
      .accent-text { fill: #c15f3c; }
      .ok { fill: #2fa35e; }
      .card { fill: #ffffff; stroke: #e5e2d9; stroke-width: 1; }
      .card-soft { fill: #f0eee6; }
      .accent-soft { fill: #f7ede8; }
      .title { font-size: 14px; font-weight: 700; fill: #191919; letter-spacing: 0.3px; }
      .nav { font-size: 13px; fill: #73726c; }
      .nav-active { font-size: 13px; font-weight: 700; fill: #c15f3c; }
      .node-label { font-size: 11px; fill: #3a3a37; text-anchor: middle; }
      .n-center { fill: #d97757; stroke: #c15f3c; stroke-width: 2; }
      .n-hop1 { fill: #f7ede8; stroke: #d6453e; stroke-width: 2; }
      .n-hop2 { fill: #ffffff; stroke: #d4a27f; stroke-width: 1.5; stroke-dasharray: 3 2; }
      .e-aff { stroke: #d6453e; stroke-width: 2; stroke-dasharray: 9 5; fill: none; }
      .e-share { stroke: #2fa35e; stroke-width: 2; stroke-dasharray: 1.5 4.5; stroke-linecap: round; fill: none; }
      .hop-t { font-size: 12px; font-weight: 700; fill: #c15f3c; letter-spacing: 0.5px; }
      .item-t { font-size: 12.5px; font-weight: 600; fill: #191919; }
      .item-r { font-size: 11px; fill: #73726c; }
      .ev { font-size: 10px; fill: #c15f3c; }
      .sel { fill: #ffffff; stroke: #d4a27f; stroke-width: 1; }
    </style>
    <marker id="ia" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1,1 L8.4,5 L1,9 Z" fill="#ffffff" stroke="#d6453e" stroke-width="1.4"/></marker>
    <marker id="is" markerWidth="10" markerHeight="9" refX="8.6" refY="4.5" orient="auto"><path d="M0.6,4.5 L4.8,1 L9,4.5 L4.8,8 Z" fill="#2fa35e"/></marker>
  </defs>

  <rect width="1440" height="900" fill="#faf9f5"/>
  <rect width="1440" height="52" fill="#f4f3ee"/>
  <line x1="0" y1="52" x2="1440" y2="52" stroke="#e5e2d9"/>
  <rect x="20" y="14" width="24" height="24" rx="6" fill="#d97757"/>
  <text x="32" y="31" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
  <text x="54" y="31" font-size="15" font-weight="700" class="ink-1">MemoryHub</text>
  <circle cx="1180" cy="26" r="4" class="ok"/>
  <text x="1192" y="30" font-size="12" class="ink-2">索引已同步 · 3 分钟前</text>

  <rect x="0" y="52" width="200" height="848" fill="#f4f3ee"/>
  <line x1="200" y1="52" x2="200" y2="900" stroke="#e5e2d9"/>
  <text x="24" y="99" class="nav">架构总览</text>
  <text x="24" y="141" class="nav">模块详情</text>
  <rect x="8" y="160" width="184" height="36" rx="8" class="accent-soft"/>
  <rect x="8" y="160" width="3" height="36" rx="1.5" fill="#d97757"/>
  <text x="24" y="183" class="nav-active">影响面分析</text>
  <text x="24" y="225" class="nav">记忆检索</text>
  <text x="24" y="267" class="nav">库健康</text>

  <!-- 查询条 -->
  <rect x="224" y="72" width="1192" height="64" rx="12" class="card"/>
  <text x="248" y="98" font-size="11" class="ink-3">要改的目标</text>
  <rect x="248" y="104" width="260" height="24" rx="6" class="sel"/>
  <text x="262" y="120" font-size="12" class="ink-1">StateSync 状态同步 ▾</text>
  <text x="536" y="98" font-size="11" class="ink-3">feature(可选)</text>
  <rect x="536" y="104" width="190" height="24" rx="6" class="sel"/>
  <text x="550" y="120" font-size="12" class="ink-3">全模块 ▾</text>
  <text x="754" y="98" font-size="11" class="ink-3">深度</text>
  <line x1="754" y1="116" x2="854" y2="116" stroke="#e5e2d9" stroke-width="4" stroke-linecap="round"/>
  <line x1="754" y1="116" x2="808" y2="116" stroke="#d97757" stroke-width="4" stroke-linecap="round"/>
  <circle cx="808" cy="116" r="7" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
  <text x="866" y="120" font-size="12" class="accent-text" font-weight="700">2 跳</text>
  <text x="920" y="98" font-size="11" class="ink-3">边类型</text>
  <rect x="920" y="104" width="64" height="24" rx="12" class="accent-soft"/>
  <text x="952" y="120" font-size="11" fill="#d6453e" text-anchor="middle">影响 ✓</text>
  <rect x="992" y="104" width="88" height="24" rx="12" class="accent-soft"/>
  <text x="1036" y="120" font-size="11" fill="#2fa35e" text-anchor="middle">共享状态 ✓</text>
  <rect x="1088" y="104" width="64" height="24" rx="12" fill="none" stroke="#e5e2d9"/>
  <text x="1120" y="120" font-size="11" class="ink-3" text-anchor="middle">依赖</text>
  <rect x="1240" y="94" width="152" height="34" rx="8" fill="#d97757"/>
  <text x="1316" y="116" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="600">分析波及面</text>

  <!-- ===== 左:波及子图 ===== -->
  <rect x="224" y="152" width="640" height="656" rx="14" class="card"/>
  <text x="248" y="184" class="title">波及子图</text>
