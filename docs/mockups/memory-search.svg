  <text x="258" y="502" class="snip">…中途加入端漏首包表现为<tspan class="hl">看不到</tspan>已<tspan class="hl">打出</tspan>的牌…</text>

  <!-- 结果 4 -->
  <rect x="240" y="534" width="568" height="96" rx="10" class="card-soft"/>
  <text x="258" y="560" class="res-name mono">feedback-mp-opponent-display-seatoffset</text>
