  <line x1="864" y1="238" x2="1392" y2="238" stroke="#eeece4"/>
  <text x="864" y="270" class="md-h">手牌选中权威状态</text>
  <text x="864" y="298" class="md-b">选牌高亮的唯一权威 = 服务器侧选中集合;客户端点击只发意图,亮不亮以</text>
  <text x="864" y="318" class="md-b">StateSync 回传为准。禁本地先置位再等确认(会闪烁回跳)。</text>
  <text x="864" y="350" font-size="13" font-weight="700" class="ink-1">Why</text>
  <text x="864" y="374" class="md-b">双端各自置位曾导致 BUG-090:后攻端高亮与服务器不一致,出牌校验失败。</text>
  <text x="864" y="406" font-size="13" font-weight="700" class="ink-1">How to apply</text>
  <rect x="864" y="422" width="528" height="88" rx="8" fill="#1f1e1d"/>
  <text x="880" y="448" class="md-code">// 点击仅发意图,不改本地高亮</text>
  <text x="880" y="468" class="md-code">BgHandOps.RequestSelect(cardId);</text>
  <text x="880" y="488" class="md-code">// 高亮统一在 OnApplied(selectionSet) 里刷新</text>
  <text x="864" y="546" class="md-b">关联:[[project_statesync_architecture]] · [[feedback-handcard-play-callback-contract]]</text>
