  <!-- 结果 1(选中态) -->
  <rect x="240" y="200" width="568" height="112" rx="10" class="accent-soft" stroke="#d4a27f"/>
  <text x="258" y="226" class="res-name mono">project_handcard_selection_authoritative_state</text>
  <rect x="258" y="238" width="92" height="20" rx="10" fill="#ffffff" stroke="#e8c8bb"/>
