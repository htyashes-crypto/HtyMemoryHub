  <text x="258" y="396" class="snip">…出牌回调后<tspan class="hl">对方</tspan>端不见牌:按 id 二次查找已移除实例导致丢牌…</text>

  <!-- 结果 3 -->
  <rect x="240" y="428" width="568" height="96" rx="10" class="card-soft"/>
  <text x="258" y="454" class="res-name mono">project_statesync_register_onapplied_timing</text>
