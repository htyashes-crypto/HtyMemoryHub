  <text x="258" y="608" class="snip">…MainUI 只<tspan class="hl">对方手牌</tspan>容器 seatOffset=1,漏设则显示错位…</text>
  <text x="524" y="668" font-size="11" class="ink-3" text-anchor="middle">…滚动查看其余 4 条</text>
